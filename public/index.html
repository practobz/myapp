<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />

    <!-- Primary Meta Tags -->
    <title>AirSpark</title>
    <meta name="title" content="AirSpark" />
    <meta name="description" content="AirSpark - The all-in-one social media management platform to schedule, publish, and analyse your content." />
    <meta name="keywords" content="social media management, content scheduling, analytics, AirSpark" />
    <meta name="author" content="AirSpark" />
    <meta name="robots" content="index, follow" />

    <!-- Theme & PWA -->
    <meta name="theme-color" content="#000000" />
    <link rel="icon" type="image/png" href="%PUBLIC_URL%/logoAirspark.png" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- Open Graph / Facebook / WhatsApp -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://airspark.storage.googleapis.com/" />
    <meta property="og:title" content="AirSpark" />
    <meta property="og:description" content="AirSpark - The all-in-one social media management platform to schedule, publish, and analyse your content." />
    <meta property="og:image" content="https://airspark.storage.googleapis.com/logo512.png" />
    <meta property="og:site_name" content="AirSpark" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://airspark.storage.googleapis.com/" />
    <meta name="twitter:title" content="AirSpark" />
    <meta name="twitter:description" content="AirSpark - The all-in-one social media management platform to schedule, publish, and analyse your content." />
    <meta name="twitter:image" content="https://airspark.storage.googleapis.com/logo512.png" />
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
